<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" aria-hidden="true">
  <defs>
    <linearGradient id="fmr" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2EC0FF"/>
      <stop offset="100%" stop-color="#0066CC"/>
    </linearGradient>
    <filter id="fmrg" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <g filter="url(#fmrg)">
    <rect x="12" y="12" width="76" height="76" rx="18" fill="url(#fmr)"/>
    <circle cx="50" cy="50" r="22" fill="none" stroke="#ffffff" stroke-width="6" opacity="0.95"/>
  </g>
</svg>
