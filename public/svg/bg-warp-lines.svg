<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" preserveAspectRatio="xMidYMid slice" aria-hidden="true">
  <defs>
    <linearGradient id="wStroke" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00A3FF" stop-opacity="0"/>
      <stop offset="38%" stop-color="#00A3FF" stop-opacity="0.95"/>
      <stop offset="62%" stop-color="#BD00FF" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#00A3FF" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="wGlow" cx="50%" cy="52%" r="58%">
      <stop offset="0%" stop-color="#00A3FF" stop-opacity="0.22"/>
      <stop offset="42%" stop-color="#BD00FF" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="1200" height="800" fill="#000000"/>
  <rect width="1200" height="800" fill="url(#wGlow)"/>
  <!-- точка схода — за центром дашборда -->
  <g opacity="0.62">
    <g stroke="url(#wStroke)" stroke-width="0.75" fill="none" stroke-linecap="round">
      <g id="rays">
        <!-- верх -->
        <line x1="600" y1="410" x2="0" y2="0"/>
        <line x1="600" y1="410" x2="100" y2="0"/>
        <line x1="600" y1="410" x2="200" y2="0"/>
        <line x1="600" y1="410" x2="300" y2="0"/>
        <line x1="600" y1="410" x2="400" y2="0"/>
        <line x1="600" y1="410" x2="500" y2="0"/>
        <line x1="600" y1="410" x2="600" y2="0"/>
        <line x1="600" y1="410" x2="700" y2="0"/>
        <line x1="600" y1="410" x2="800" y2="0"/>
        <line x1="600" y1="410" x2="900" y2="0"/>
        <line x1="600" y1="410" x2="1000" y2="0"/>
        <line x1="600" y1="410" x2="1100" y2="0"/>
        <line x1="600" y1="410" x2="1200" y2="0"/>
        <!-- низ -->
        <line x1="600" y1="410" x2="0" y2="800"/>
        <line x1="600" y1="410" x2="150" y2="800"/>
        <line x1="600" y1="410" x2="300" y2="800"/>
        <line x1="600" y1="410" x2="450" y2="800"/>
        <line x1="600" y1="410" x2="600" y2="800"/>
        <line x1="600" y1="410" x2="750" y2="800"/>
        <line x1="600" y1="410" x2="900" y2="800"/>
        <line x1="600" y1="410" x2="1050" y2="800"/>
        <line x1="600" y1="410" x2="1200" y2="800"/>
        <!-- бока -->
        <line x1="600" y1="410" x2="0" y2="200"/>
        <line x1="600" y1="410" x2="0" y2="400"/>
        <line x1="600" y1="410" x2="0" y2="600"/>
        <line x1="600" y1="410" x2="1200" y2="200"/>
        <line x1="600" y1="410" x2="1200" y2="400"/>
        <line x1="600" y1="410" x2="1200" y2="600"/>
        <!-- диагонали -->
        <line x1="600" y1="410" x2="0" y2="100"/>
        <line x1="600" y1="410" x2="1200" y2="100"/>
        <line x1="600" y1="410" x2="200" y2="800"/>
        <line x1="600" y1="410" x2="1000" y2="800"/>
        <line x1="600" y1="410" x2="300" y2="350"/>
        <line x1="600" y1="410" x2="900" y2="350"/>
      </g>
    </g>
  </g>
</svg>
