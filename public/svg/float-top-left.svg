<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 160 160" aria-hidden="true">
  <defs>
    <linearGradient id="plt1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#5B8CFF"/>
      <stop offset="100%" stop-color="#1E4FC4"/>
    </linearGradient>
    <linearGradient id="plt2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#BD00FF"/>
      <stop offset="100%" stop-color="#5C0D9A"/>
    </linearGradient>
    <linearGradient id="plt3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00A3FF"/>
      <stop offset="100%" stop-color="#0044AA"/>
    </linearGradient>
    <filter id="plGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="8" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <g filter="url(#plGlow)">
    <!-- стопка скруглённых пластин сине–фиолетовая, как на макете -->
    <rect x="28" y="44" width="100" height="100" rx="24" fill="url(#plt2)" opacity="0.95" transform="rotate(-6 78 94)"/>
    <rect x="20" y="32" width="100" height="100" rx="24" fill="url(#plt1)" opacity="0.92" transform="rotate(-4 70 82)"/>
    <rect x="14" y="22" width="100" height="100" rx="24" fill="url(#plt3)" transform="rotate(-2 64 72)"/>
    <rect x="10" y="14" width="100" height="100" rx="24" fill="url(#plt2)" opacity="0.85" transform="rotate(2 60 64)"/>
  </g>
</svg>
