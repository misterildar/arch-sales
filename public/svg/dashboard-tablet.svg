<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 540" aria-hidden="true">
  <defs>
    <linearGradient id="dtFrame" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1a2a44"/>
      <stop offset="100%" stop-color="#050810"/>
    </linearGradient>
    <linearGradient id="dtGlass" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="rgba(0,163,255,0.12)"/>
      <stop offset="100%" stop-color="rgba(189,0,255,0.06)"/>
    </linearGradient>
    <linearGradient id="dtBar" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#004488"/>
      <stop offset="100%" stop-color="#00A3FF"/>
    </linearGradient>
    <linearGradient id="dtDonut" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00A3FF"/>
      <stop offset="55%" stop-color="#BD00FF"/>
      <stop offset="100%" stop-color="#00A3FF"/>
    </linearGradient>
  </defs>

  <!-- outer tablet -->
  <g>
    <rect x="24" y="24" width="872" height="492" rx="28" fill="#020508" stroke="rgba(0,163,255,0.35)" stroke-width="1.5"/>
    <rect x="36" y="36" width="848" height="468" rx="20" fill="url(#dtFrame)"/>
    <rect x="36" y="36" width="848" height="468" rx="20" fill="url(#dtGlass)"/>

    <!-- title bar -->
    <text x="64" y="78" fill="#ffffff" font-family="system-ui, sans-serif" font-size="22" font-weight="700">Архитектор</text>
    <circle cx="848" cy="68" r="5" fill="#ff5f57"/>
    <circle cx="828" cy="68" r="5" fill="#febc2e"/>
    <circle cx="808" cy="68" r="5" fill="#28c840"/>

    <!-- sidebar -->
    <rect x="52" y="104" width="56" height="380" rx="12" fill="rgba(0,0,0,0.35)"/>
    <rect x="64" y="118" width="32" height="32" rx="8" fill="rgba(0,163,255,0.35)" stroke="#00A3FF" stroke-width="1"/>
    <rect x="64" y="162" width="32" height="32" rx="8" fill="rgba(255,255,255,0.06)"/>
    <rect x="64" y="206" width="32" height="32" rx="8" fill="rgba(255,255,255,0.06)"/>
    <rect x="64" y="250" width="32" height="32" rx="8" fill="rgba(255,255,255,0.06)"/>

    <!-- KPI row -->
    <g font-family="system-ui, sans-serif">
      <rect x="128" y="112" width="168" height="72" rx="10" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)"/>
      <text x="148" y="138" fill="rgba(255,255,255,0.45)" font-size="12">KPI</text>
      <text x="148" y="168" fill="#00A3FF" font-size="26" font-weight="700">50,92%</text>

      <rect x="312" y="112" width="168" height="72" rx="10" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)"/>
      <text x="332" y="138" fill="rgba(255,255,255,0.45)" font-size="12">Sales</text>
      <text x="332" y="168" fill="#ffffff" font-size="26" font-weight="700">470</text>

      <rect x="496" y="112" width="168" height="72" rx="10" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)"/>
      <text x="516" y="138" fill="rgba(255,255,255,0.45)" font-size="12">Leads</text>
      <text x="516" y="168" fill="#BD00FF" font-size="26" font-weight="700">90A</text>

      <rect x="680" y="112" width="168" height="72" rx="10" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)"/>
      <text x="700" y="138" fill="rgba(255,255,255,0.45)" font-size="12">Conv.</text>
      <text x="700" y="168" fill="#00A3FF" font-size="26" font-weight="700">68%</text>
    </g>

    <!-- CRM chart block -->
    <rect x="128" y="204" width="520" height="200" rx="12" fill="rgba(0,0,0,0.4)" stroke="rgba(0,163,255,0.2)"/>
    <text x="152" y="236" fill="rgba(255,255,255,0.5)" font-family="system-ui, sans-serif" font-size="13" font-weight="600">CRM</text>
    <!-- area line -->
    <path d="M152 360 L200 320 L248 340 L296 300 L344 310 L392 280 L440 290 L488 270 L536 285 L584 260 L632 275 L680 250" fill="none" stroke="#00A3FF" stroke-width="2.5" opacity="0.9"/>
    <path d="M152 360 L200 320 L248 340 L296 300 L344 310 L392 280 L440 290 L488 270 L536 285 L584 260 L632 275 L680 250 L680 380 L152 380 Z" fill="url(#dtBar)" opacity="0.15"/>
    <!-- bars -->
    <rect x="168" y="300" width="28" height="80" rx="4" fill="url(#dtBar)"/>
    <rect x="208" y="280" width="28" height="100" rx="4" fill="url(#dtBar)" opacity="0.85"/>
    <rect x="248" y="310" width="28" height="70" rx="4" fill="url(#dtBar)" opacity="0.7"/>
    <rect x="288" y="265" width="28" height="115" rx="4" fill="url(#dtBar)"/>
    <rect x="328" y="290" width="28" height="90" rx="4" fill="url(#dtBar)" opacity="0.8"/>
    <rect x="368" y="250" width="28" height="130" rx="4" fill="url(#dtBar)"/>
    <rect x="408" y="275" width="28" height="105" rx="4" fill="url(#dtBar)" opacity="0.75"/>
    <rect x="448" y="260" width="28" height="120" rx="4" fill="url(#dtBar)"/>
    <rect x="488" y="285" width="28" height="95" rx="4" fill="url(#dtBar)" opacity="0.85"/>
    <rect x="528" y="270" width="28" height="110" rx="4" fill="url(#dtBar)"/>
    <rect x="568" y="255" width="28" height="125" rx="4" fill="url(#dtBar)" opacity="0.9"/>
    <rect x="608" y="290" width="28" height="90" rx="4" fill="url(#dtBar)"/>

    <!-- donut -->
    <g transform="translate(688 254)">
      <circle r="78" cx="78" cy="78" fill="none" stroke="rgba(255,255,255,0.08)" stroke-width="18"/>
      <circle r="78" cx="78" cy="78" fill="none" stroke="url(#dtDonut)" stroke-width="18" stroke-dasharray="320 170" stroke-linecap="round" transform="rotate(-90 78 78)"/>
      <text x="78" y="86" text-anchor="middle" fill="#ffffff" font-family="system-ui, sans-serif" font-size="22" font-weight="700">68%</text>
    </g>

    <!-- bottom rows -->
    <rect x="128" y="420" width="720" height="52" rx="10" fill="rgba(255,255,255,0.03)" stroke="rgba(255,255,255,0.06)"/>
    <rect x="148" y="436" width="200" height="16" rx="8" fill="rgba(0,163,255,0.4)"/>
    <rect x="360" y="436" width="140" height="16" rx="8" fill="#BD00FF" opacity="0.55"/>

    <rect x="128" y="482" width="720" height="14" rx="7" fill="rgba(255,255,255,0.04)"/>
    <rect x="148" y="486" width="480" height="6" rx="3" fill="rgba(0,163,255,0.45)"/>
    <rect x="148" y="498" width="360" height="6" rx="3" fill="rgba(189,0,255,0.4)"/>
  </g>
</svg>
